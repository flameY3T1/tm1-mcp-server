name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (no flat TM1 API)
        run: npm run lint:no-flat-api

      - name: Lint (annotation coverage)
        run: npm run lint:annotations

      - name: Build
        run: npm run build

      - name: Coverage (enforces vitest thresholds)
        run: npm run test:coverage

      - name: Audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false
