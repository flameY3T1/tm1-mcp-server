name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (no flat TM1 API)
        run: npm run lint:no-flat-api

      - name: Lint (annotation coverage)
        run: npm run lint:annotations

      - name: Lint (ESLint)
        run: npm run lint:eslint

      - name: Build
        run: npm run build

      - name: Coverage (enforces vitest thresholds)
        run: npm run test:coverage

      # Gate on what consumers actually install: the published package ships
      # only dist/ + runtime deps (files:["dist"]). Dev-only advisories (e.g.
      # vite via vitest) don't reach users and must not block a release.
      - name: Audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: false

      # Full-tree audit incl. devDependencies — informational, never blocks.
      - name: Audit (all deps, informational)
        run: npm audit --audit-level=high
        continue-on-error: true
